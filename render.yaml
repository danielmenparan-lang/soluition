# Render Blueprint — Shopify Marketing Solution

services:
  - type: web
    name: shopify-marketing-solution
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci --include=dev && npm run build && npx prisma generate
    startCommand: node scripts/render-start.mjs
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: "22.12.0"
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: NODE_OPTIONS
        value: --max-old-space-size=384
      - key: SCOPES
        value: read_analytics,read_content,read_products
      - key: DATABASE_URL
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SUPPORT_EMAIL
        value: "vonx.support@gmail.com"
