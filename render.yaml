# Render Blueprint — Shopify Marketing Solution
# Native Node (more stable on free tier than Docker)

services:
  - type: web
    name: shopify-marketing-solution
    runtime: node
    plan: free
    region: frankfurt
    buildCommand: npm ci && npm run build && npx prisma generate
    startCommand: node ./node_modules/@react-router/serve/dist/cli.js ./build/server/index.js
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: NODE_OPTIONS
        value: --max-old-space-size=460
      - key: SCOPES
        value: read_analytics,read_content,read_customers,read_orders,read_products,write_script_tags
      - key: DATABASE_URL
        sync: false
      - key: SHOPIFY_API_KEY
        sync: false
      - key: SHOPIFY_API_SECRET
        sync: false
      - key: SHOPIFY_APP_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
