# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration

client_id = "00eb38f774ffba914d98a6800f4c5df5"
name = "solution"
application_url = "https://shopify-marketing-solution.onrender.com"
embedded = true

[build]
automatically_update_urls_on_dev = false

[webhooks]
api_version = "2026-10"

  [[webhooks.subscriptions]]
  topics = ["app/uninstalled"]
  uri = "/webhooks/app/uninstalled"

  [[webhooks.subscriptions]]
  topics = ["app/scopes_update"]
  uri = "/webhooks/app/scopes_update"

  # orders/create requires Protected Customer Data in Partners Dashboard.
  # Re-enable after: Partners → App → API access → Protected customer data (step 1).
  # Purchase revenue is still tracked via storefront tracker.js.
  # [[webhooks.subscriptions]]
  # topics = ["orders/create"]
  # uri = "/webhooks/orders/create"

  [[webhooks.subscriptions]]
  compliance_topics = ["customers/data_request", "customers/redact", "shop/redact"]
  uri = "/webhooks/compliance"

[access_scopes]
# No Admin API data access — analytics come from the theme app embed + tracker.js
scopes = ""

[auth]
redirect_urls = [
  "https://shopify-marketing-solution.onrender.com/auth/callback"
]
